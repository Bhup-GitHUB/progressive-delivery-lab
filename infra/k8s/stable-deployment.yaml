apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-stable
  labels:
    app: checkout
    track: stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: checkout
      track: stable
  template:
    metadata:
      labels:
        app: checkout
        track: stable
    spec:
      containers:
        - name: app
          image: progressive-delivery-lab/app:v1
          ports:
            - containerPort: 8080
          env:
            - name: VERSION
              value: v1
            - name: ERROR_RATE
              value: "0"
            - name: BASE_LATENCY_MS
              value: "120"
            - name: FEATURE_FLAG_URL
              value: http://flag-service:8080
